apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iamthebonbon/java.spring.spring-certified-professional.git
    targetRevision: main
    path: ./.argocd/.k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: scp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
