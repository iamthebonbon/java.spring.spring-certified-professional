#
bonbon.one=Marmalade
bonbon.two=Marshmallow
#
spring.application.name=bonbon
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
#
management.endpoints.web.base-path=/management
management.endpoints.web.path-mapping.health=status
management.endpoints.web.exposure.include=health,info,metrics,bonbon
#
management.endpoint.health.show-details=when_authorized
management.endpoint.health.group.default.include=db,diskSpace
management.endpoint.health.group.default.show-details=when_authorized
management.endpoint.health.group.external.include=bonbon
management.endpoint.health.group.external.show-details=when_authorized
#
management.info.os.enabled=true
management.info.env.enabled=true
management.info.java.enabled=true
management.info.process.enabled=true
info.bonbon.one=Marmalade
info.bonbon.two=Marshmallow
#
management.server.port=8081
# Global tag
management.metrics.tags.app=bonbon
#
management.endpoints.web.cors.allowed-origin-patterns=*
management.endpoints.web.cors.allowed-headers=*
management.endpoints.web.cors.allowed-methods=GET,POST,DELETE
management.endpoints.web.cors.allow-credentials=true
